body:
  text: 一例言一滿洲醫科大學中國醫學研究室所藏之漢籍約一千六百餘種中本書仍選其記載丹方之醫書三百二十二種一一録其丹方之名目有一方載於數書者有數方載於一書者按其方名之筆畫依辭典排列之式記其出處共得二千四百五方一本一覽本為便宜上專採其方名為本表之基礎一排列處方之次序依辭典方式視其首字筆畫多少為定字畫少者置於前字畫多者列於後如逢首字相同時以其第二字之筆畫多寡而定之一本書一覽表之表格分為三欄第一欄乃處方番號第二欄乃處方名第三欄表其所出之處其下連之數字仍表明由同一書籍中收載丹方之番號一引用書目之表格成為四欄第一欄乃醫書之番號第二欄書名第三欄乃引用書之中國醫學書目之分類番號第四欄乃由同書所取的丹方數存仁按第三欄因無關係故刪去一本表中未備之處甚多對於活用上本擬連載卷數惟余近來毫無餘暇且余就一覽表觀之亦未覺如何不便故此先付印後來如覺不滿將漸次改訂二引用書目三丹方一覽
